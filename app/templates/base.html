<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP-Trustchain | Security Authority</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    colors: {
                        primary: '#050d1f',
                        surface: '#0b1628',
                        panel: '#111f38',
                        card: '#162238',
                        border: '#1e3a5f',
                        brandTeal: '#14b8a6',
                        brandRed: '#ef4444',
                        brandAmber: '#f59e0b',
                        brandGray: '#94a3b8',
                        brandPurple: '#a855f7',
                        brandBlue: '#3b82f6',
                        brandIndigo: '#6366f1',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050d1f;
            color: #e2e8f0;
        }

        /* Animated gradient background accent */
        .bg-hero-mesh {
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(20, 184, 166, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 60% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 60%);
        }

        .page-transition {
            animation: fadeIn 0.25s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glowing nav active indicator */
        .nav-active {
            background: linear-gradient(90deg, rgba(20, 184, 166, 0.15) 0%, rgba(20, 184, 166, 0.03) 100%);
            border-left: 2px solid #14b8a6;
            color: #14b8a6;
        }

        .nav-item {
            border-left: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-left-color: rgba(20, 184, 166, 0.4);
        }

        /* Sidebar shimmer line */
        .sidebar-line {
            background: linear-gradient(180deg, transparent, rgba(99, 102, 241, 0.4), rgba(20, 184, 166, 0.4), transparent);
        }

        .glow-teal {
            box-shadow: 0 0 20px rgba(20, 184, 166, 0.25);
        }

        .glow-red {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.25);
        }

        .glow-amber {
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.25);
        }

        .glow-purple {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.25);
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden antialiased bg-primary bg-hero-mesh">

    <!-- Sidebar -->
    <aside class="w-64 flex-shrink-0 flex flex-col h-full border-r border-border/60 relative overflow-hidden"
        style="background: linear-gradient(180deg, #0b1628 0%, #0d1e35 100%);">
        <!-- Top glow -->
        <div class="absolute top-0 left-0 right-0 h-px sidebar-line"></div>
        <!-- Ambient glow blobs -->
        <div class="absolute -top-20 -left-10 w-48 h-48 bg-brandIndigo/10 rounded-full blur-3xl pointer-events-none">
        </div>
        <div class="absolute -bottom-20 -right-10 w-48 h-48 bg-brandTeal/10 rounded-full blur-3xl pointer-events-none">
        </div>

        <!-- Logo -->
        <div class="h-16 flex items-center px-5 border-b border-border/60 relative z-10">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center glow-teal"
                    style="background: linear-gradient(135deg, #0d9488, #14b8a6);">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <div>
                    <div class="font-bold text-white text-sm tracking-wide leading-tight">MCP-Trustchain</div>
                    <div class="text-xs text-brandTeal/70 font-medium tracking-wider">SECURITY AUTHORITY</div>
                </div>
            </div>
        </div>

        <!-- Nav -->
        <nav class="flex-1 py-5 px-3 space-y-1 relative z-10 overflow-y-auto">
            <p class="text-xs font-semibold text-slate-600 uppercase tracking-widest px-3 mb-3">Navigation</p>

            <a href="/"
                class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm font-medium {{ 'nav-active' if request.url.path == '/' else 'text-slate-400' }}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
                Dashboard
            </a>
            <a href="/registry"
                class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm font-medium {{ 'nav-active' if request.url.path == '/registry' else 'text-slate-400' }}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                Tool Registry
            </a>
            <a href="/scanner"
                class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm font-medium {{ 'nav-active' if request.url.path == '/scanner' else 'text-slate-400' }}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                Static Scanner
            </a>
            <a href="/verify"
                class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm font-medium {{ 'nav-active' if request.url.path == '/verify' else 'text-slate-400' }}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Verify Simulation
            </a>
            <a href="/audit"
                class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm font-medium {{ 'nav-active' if request.url.path == '/audit' else 'text-slate-400' }}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Audit Logs
            </a>
        </nav>

        <div class="px-5 py-4 border-t border-border/60 relative z-10">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-brandTeal animate-pulse"></div>
                <span class="text-xs text-slate-500">System Online · v1.0</span>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col h-full overflow-y-auto page-transition">
        <header class="h-16 flex items-center justify-between px-8 border-b border-border/60 sticky top-0 z-10"
            style="background: rgba(5,13,31,0.85); backdrop-filter: blur(12px);">
            <h1 class="text-lg font-semibold text-white tracking-tight">{% block header_title %}Dashboard{% endblock %}
            </h1>
            <div class="flex items-center gap-2 text-xs text-slate-500 font-mono">
                <svg class="w-3 h-3 text-brandIndigo" fill="currentColor" viewBox="0 0 8 8">
                    <circle cx="4" cy="4" r="4" />
                </svg>
                Deterministic · Rule-Based · No ML
            </div>
        </header>

        <div class="p-8 max-w-7xl mx-auto w-full">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% block scripts %}{% endblock %}
</body>

</html>
